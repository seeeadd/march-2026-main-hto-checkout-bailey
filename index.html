:root{
  --font:'Satoshi',sans-serif;
  --display:'OGG',Georgia,serif;
  --accent:'Caveat',cursive;
  --dark:#1A1816;
  --coral:#E07A5F;
  --gold:#D4A853;
  --cream:#FAF8F5;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--font);
  background:var(--cream);
  color:var(--dark);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  text-align:center;
}
.wrap{max-width:580px;width:100%}

/* Lock animation - shackle pops up then slams shut */
.lock-anim .lock-shackle{
  transform-origin:12px 11px;
  animation:lockSlam 3s ease-in-out infinite;
}
.lock-anim{
  animation:lockShake 3s ease-in-out infinite;
}
@keyframes lockSlam{
  0%,100%{transform:translateY(0)}
  15%{transform:translateY(-4px)}
  25%{transform:translateY(-4px)}
  35%{transform:translateY(0)}
  38%{transform:translateY(-1px)}
  41%{transform:translateY(0)}
}
@keyframes lockShake{
  0%,100%{transform:rotate(0)}
  35%{transform:rotate(0)}
  36%{transform:rotate(-4deg)}
  37%{transform:rotate(4deg)}
  38%{transform:rotate(-2deg)}
  39%{transform:rotate(0)}
}
.badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 18px;
  background:rgba(224,122,95,.08);
  border:1px solid rgba(224,122,95,.2);
  border-radius:100px;
  font-size:11px;font-weight:700;color:var(--coral);
  text-transform:uppercase;letter-spacing:.12em;
  margin-bottom:20px;
}

h1{
  font-family:var(--display);
  font-size:clamp(26px,4.5vw,40px);
  line-height:1.4;
  margin-bottom:12px;
}
h1 img{
  height:clamp(50px,8vw,80px);
  vertical-align:middle;
  margin:0 6px -4px;
  display:inline;
}
.sub{
  font-size:19px;color:#666;line-height:1.7;
  margin-bottom:24px;
  max-width:460px;margin-left:auto;margin-right:auto;
}
.sub strong{color:var(--dark)}

a.img-link{display:block;margin-bottom:24px;transition:transform .3s}
a.img-link:hover{transform:scale(1.02)}
a.img-link img{
  max-width:100%;height:auto;max-height:220px;
  object-fit:contain;border-radius:12px;
}

.cta{
  display:inline-flex;align-items:center;gap:10px;
  padding:16px 36px;
  background:linear-gradient(135deg,var(--coral),#C4643D);
  color:#fff;font-family:var(--font);
  font-size:15px;font-weight:700;
  text-decoration:none;border-radius:12px;
  letter-spacing:.03em;text-transform:uppercase;
  transition:all .3s;
  box-shadow:0 6px 24px rgba(224,122,95,.3);
  position:relative;overflow:hidden;
}
.cta:hover{transform:translateY(-2px);box-shadow:0 10px 36px rgba(224,122,95,.4)}
.cta::after{
  content:'';position:absolute;top:0;height:100%;width:30%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);
  animation:shimmer 3.5s ease-in-out infinite;
}
@keyframes shimmer{0%{left:-35%;opacity:0}40%{opacity:.6}100%{left:135%;opacity:0}}

.foot{margin-top:20px;font-size:11px;color:#bbb}
.foot a{color:#aaa}

@media(max-width:480px){
  h1{font-size:24px}
  .sub{font-size:14px}
  .cta{font-size:13px;padding:14px 28px}
  a.img-link img{max-height:160px}
}
</style>
</head>
